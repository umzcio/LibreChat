version: 1.3.5
cache: true

interface:
  customFooter: "ChatMT.ai - Safe AI for the Montana University System"

endpoints:
  custom:
    # Perplexity AI
    - name: "Perplexity"
      apiKey: "${PERPLEXITY_API_KEY}"
      baseURL: "https://api.perplexity.ai/"
      models:
        default:
          - "sonar-deep-research"
          - "sonar-reasoning-pro"
          - "sonar-reasoning"
          - "sonar-pro"
          - "sonar"
          - "r1-1776"
        fetch: false
      titleConvo: true
      titleModel: "sonar"
      summarize: false
      summaryModel: "sonar"
      dropParams: ["stop", "frequency_penalty"]
      modelDisplayLabel: "Perplexity"

    # xAI (Grok)
    - name: "xai"
      apiKey: "${XAI_API_KEY}"
      baseURL: "https://api.x.ai/v1"
      models:
        default:
          - "grok-4-latest"
          - "grok-4-fast-reasoning"
        fetch: false
      titleConvo: true
      titleMethod: "completion"
      titleModel: "grok-4-latest"
      summarize: false
      summaryModel: "grok-4-latest"
      modelDisplayLabel: "Grok"

registration:
  allowedDomains:
    - "umontana.edu"

version: 1.3.5
cache: true

endpoints:
  custom:
    # Perplexity AI
    - name: "Perplexity"
      apiKey: "${PERPLEXITY_API_KEY}"
      baseURL: "https://api.perplexity.ai/"
      models:
        default:
          - "sonar-deep-research"
          - "sonar-reasoning-pro"
          - "sonar-reasoning"
          - "sonar-pro"
          - "sonar"
          - "r1-1776"
        fetch: false
      titleConvo: true
      titleModel: "sonar"
      summarize: false
      summaryModel: "sonar"
      dropParams: ["stop", "frequency_penalty"]
      modelDisplayLabel: "Perplexity"

    # xAI (Grok)
    - name: "xai"
      apiKey: "${XAI_API_KEY}"
      baseURL: "https://api.x.ai/v1"
      models:
        default:
          - "grok-4.20-reasoning-latest"
          - "grok-4-1-fast-reasoning-latest"
          - "grok-4.20-0309-reasoning"
        fetch: false
      titleConvo: true
      titleMethod: "completion"
      titleModel: "grok-4.20-reasoning-latest"
      summarize: false
      summaryModel: "grok-4.20-reasoning-latest"
      modelDisplayLabel: "Grok"

    # OpenRouter
    - name: "OpenRouter"
      apiKey: "${OPENROUTER_API_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default:
          - "xiaomi/mimo-v2-pro"
          - "minimax/minimax-m2.5"
          - "deepseek/deepseek-v3.2"
          - "moonshotai/kimi-k2.5"
          - "z-ai/glm-5-turbo"
          - "mistralai/mistral-small-2603"
          - "stepfun/step-3.5-flash:free"
        fetch: false
      titleConvo: true
      titleModel: "deepseek/deepseek-v3.2"
      summarize: false
      summaryModel: "deepseek/deepseek-v3.2"
      modelDisplayLabel: "OpenRouter"

mcpSettings:
  allowedDomains:
    - "zr-mcp-research"

mcpServers:
  deep-research:
    type: streamable-http
    url: http://zr-mcp-research:10000/mcp
    timeout: 360000
    initTimeout: 10000

registration:
  allowedDomains:
    - "umontana.edu"

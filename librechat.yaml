# LibreChat Configuration File
# Version: 1.2.8
# Generated: 2025-10-24
#
# This file configures AI endpoints, models, and other LibreChat settings
# Place this in your repository root and set CONFIG_PATH=/app/librechat.yaml in Render

version: 1.2.8
cache: true

# ============================================
# ENDPOINTS CONFIGURATION
# ============================================
# This section configures which AI providers are available

endpoints:
  # OpenAI
  openAI:
    models:
      default:
        - "gpt-5.4"
        - "gpt-5.4-pro"
        - "gpt-5.4-thinking"
        - "o4-mini"
        - "o3"
      fetch: false
    titleConvo: true
    titleModel: "o4-mini"
    summarize: false
    summaryModel: "o4-mini"

  # Anthropic (Claude)
  anthropic:
    models:
      default:
        - "claude-opus-4-6"
        - "claude-sonnet-4-6"
        - "claude-haiku-4-5"
      fetch: false
    titleConvo: true
    titleModel: "claude-haiku-4-5"

  # Google (Gemini)
  google:
    models:
      default:
        - "gemini-2.5-pro"
        - "gemini-2.5-flash"
        - "gemini-2.5-flash-lite"
      fetch: false
    titleConvo: true

  # ============================================
  # CUSTOM ENDPOINTS
  # ============================================

  custom:
    # Perplexity AI
    - name: "Perplexity"
      apiKey: "${PERPLEXITY_API_KEY}"
      baseURL: "https://api.perplexity.ai/"
      models:
        default:
          - "sonar-deep-research"
          - "sonar-reasoning-pro"
          - "sonar-reasoning"
          - "sonar-pro"
          - "sonar"
          - "r1-1776"
        fetch: false
      titleConvo: true
      titleModel: "sonar"
      summarize: false
      summaryModel: "sonar"
      forcePrompt: false
      dropParams: ["stop", "frequency_penalty"]
      modelDisplayLabel: "Perplexity"

    # xAI (Grok)
    - name: "xai"
      apiKey: "${XAI_API_KEY}"
      baseURL: "https://api.x.ai/v1"
      models:
        default:
          - "grok-4-latest"
          - "grok-4-fast-reasoning"
        fetch: false
      titleConvo: true
      titleMethod: "completion"
      titleModel: "grok-4-latest"
      summarize: false
      summaryModel: "grok-4-latest"
      forcePrompt: false
      modelDisplayLabel: "Grok"

    # OpenRouter (optional - uncomment if needed)
    # - name: "OpenRouter"
    #   apiKey: "${OPENROUTER_KEY}"
    #   baseURL: "https://openrouter.ai/api/v1"
    #   models:
    #     default:
    #       - "openai/gpt-4"
    #       - "anthropic/claude-3-opus"
    #       - "meta-llama/llama-3-70b"
    #   fetch: true
    #   titleConvo: true
    #   titleModel: "openai/gpt-3.5-turbo"
    #   modelDisplayLabel: "OpenRouter"

# ============================================
# INTERFACE CONFIGURATION
# ============================================
interface:
  customFooter: "ChatMT.ai - Safe AI for the Montana University System"

  # Privacy and data handling
  privacyPolicy:
    externalUrl: ""
    openNewTab: true

  # Terms of Service
  termsOfService:
    externalUrl: ""
    openNewTab: true

